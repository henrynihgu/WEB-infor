<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - My Web Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Background Utama Bertema Limbus */
        body {
            background: linear-gradient(135deg, #1c1611 0%, #2d2219 100%) !important;
            color: #e3dcd3 !important;
            min-height: 100vh;
        }

        /* Navigasi Hitam & Border Merah Tua */
        .navbar {
            background-color: #0c0a08 !important;
            border-bottom: 3px solid #5c1d1d !important; 
        }
        .navbar-nav .nav-link { color: #bfaea3 !important; }
        .navbar-nav .nav-link:hover, .navbar-nav .nav-link.active { color: #b38f43 !important; }
        .navbar-brand { color: #b38f43 !important; }

        /* Desain Kotak Form (Kotak Tajam) */
        .card {
            background-color: #0c0a08 !important;
            border: 2px solid #3d3023 !important;
            border-radius: 0px !important;
        }
        .card-title {
            color: #b38f43 !important;
        }

        /* Form Input */
        .form-control {
            background-color: #14110f !important;
            border: 1px solid #5c4a3c !important;
            color: #e3dcd3 !important;
            border-radius: 0px !important;
        }
        .form-control:focus {
            border-color: #b38f43 !important;
            box-shadow: 0 0 5px rgba(179, 143, 67, 0.3) !important;
        }

        /* Tombol Kotak Limbus */
        .btn-limbus {
            border-radius: 0px !important;
            background-color: #0c0a08 !important;
            color: #b38f43 !important; 
            border: 2px solid #b38f43 !important; 
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-limbus:hover {
            background-color: #b38f43 !important;
            color: #0c0a08 !important; 
            box-shadow: 0 0 10px rgba(179, 143, 67, 0.5); 
        }

        /* Desain Notifikasi Sukses */
        .alert-success-limbus {
            border-radius: 0px !important;
            background-color: #14110f !important;
            border: 2px solid #b38f43 !important;
            color: #b38f43 !important;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">MyWebsite</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="profile.html">Profile & Game</a>
                <a class="nav-link active" href="contact.html">Contact Us</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4" style="border-top: 4px solid #5c1d1d;">
                        <h3 class="card-title text-center mb-4 fw-bold">Hubungi Kami</h3>
                        
                        <form id="contactForm" onsubmit="kirimPesan(event)">
                            <div class="mb-3">
                                <label for="nama" class="form-label" style="color: #bfaea3;">Nama Lengkap</label>
                                <input type="text" class="form-control" id="nama" required placeholder="Masukkan nama kamu">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label" style="color: #bfaea3;">Alamat Email</label>
                                <input type="email" class="form-control" id="email" required placeholder="nama@email.com">
                            </div>
                            <div class="mb-3">
                                <label for="pesan" class="form-label" style="color: #bfaea3;">Pesan / Masukan</label>
                                <textarea class="form-control" id="pesan" rows="4" required placeholder="Tulis laporan atau pesanmu di sini..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-limbus w-100 py-2">Kirim Laporan</button>
                        </form>

                        <div id="notifSukses" class="alert-success-limbus d-none mt-4 text-center p-3"></div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function kirimPesan(event) {
            event.preventDefault(); // Mencegah halaman refresh otomatis
            
            const nama = document.getElementById('nama').value;
            const notif = document.getElementById('notifSukses');
            
            notif.classList.remove('d-none');
            notif.innerHTML = `🚀 <strong>SISTEM:</strong> Data berhasil dikirim. Terima kasih, Manajer <strong>${nama}</strong>. Laporan Anda sedang diproses.`;
            
            document.getElementById('contactForm').reset();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
