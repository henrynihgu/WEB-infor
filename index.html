<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page - My Web Project</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
   <style>
        /* Background bertema Golden Brown tua */
        .hero-section {
            background: linear-gradient(135deg, #1c1611 0%, #2d2219 100%);
            color: #e3dcd3; /* Warna teks putih gading redup */
            padding: 140px 0;
            border-bottom: 4px solid #5c1d1d; /* Border web merah gelap */
        }

        /* Navigasi disesuaikan jadi hitam legam dengan border bawah merah tua */
        .navbar {
            background-color: #360303 !important;
            border-bottom: 3px solid #5c1d1d !important; /* Mengubah garis bawah menjadi merah tua dan sedikit lebih tebal */
        }
        
        /* Mengubah warna teks menu navbar menjadi gading redup */
        .navbar-nav .nav-link {
            color: #bfaea3 !important;
        }

        /* Mengubah warna menu menjadi emas saat diarahkan kursor */
        .navbar-nav .nav-link:hover, .navbar-nav .nav-link.active {
            color: #b38f43 !important;
        }

        /* Mengubah warna tulisan MyWebsite menjadi emas */
        .navbar-brand {
            color: #b38f43 !important;
        }

        /* Kustomisasi Tombol (Kotak, Border Emas, Dalam Hitam) */
        .btn-limbus {
            border-radius: 0px !important;
            background-color: #0c0a08 !important;
            color: #b38f43 !important; /* Teks warna emas */
            border: 2px solid #b38f43 !important; /* Border emas/cokelat tua */
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* Efek saat tombol diarahkan kursor (Hover) */
        .btn-limbus:hover {
            background-color: #b38f43 !important;
            color: #0c0a08 !important; /* Tukar warna saat di-hover */
            box-shadow: 0 0 10px rgba(179, 143, 67, 0.5); /* Efek glow tipis */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">MyWebsite</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="index.html">Home</a>
                <a class="nav-link" href="profile.html">Profile & Game</a>
                <a class="nav-link" href="contact.html">Contact Us</a>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-3 fw-bold mb-3">Selamat Datang di Web Saya</h1>
            <p class="lead mb-4">Ini adalah project tugas akhir web menggunakan Bootstrap 5 dan JavaScript.</p>
<a href="profile.html" class="btn btn-limbus btn-lg px-4 me-2">Mulai Main Game</a>
            <a href="contact.html" class="btn btn-limbus btn-lg px-4">Hubungi Saya</a>        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
